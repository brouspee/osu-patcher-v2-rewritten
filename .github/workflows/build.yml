name: Build Patcher APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build release APK
        run: gradle assembleRelease --no-daemon

      - name: Find build-tools version
        run: |
          echo "BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)" >> $GITHUB_ENV

      - name: Sign APK with debug key
        run: |
          APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "Found APK: $APK"
          if [ ! -f ~/.android/debug.keystore ]; then
            mkdir -p ~/.android
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out patcher-signed.apk \
            "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: osu-patcher
          path: patcher-signed.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: "osu!Patch v${{ github.run_number }}"
          files: patcher-signed.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
